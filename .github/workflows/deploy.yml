name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # 指定 cache 尋找的路徑
          cache: 'npm'
          cache-dependency-path: client-app/react/package-lock.json

      - name: Install dependencies
        # 使用 working-directory 指定路徑
        working-directory: client-app/react
        run: npm install

      - name: Build
        working-directory: client-app/react
        run: npm run build

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: client-app/react/dist # 注意這裡也要改路徑
          branch: gh-pages